# Reusable deploy workflow. Called by deploy-dev.yml and deploy-prod.yml with
# environment-specific secrets injected. Builds image, pushes to GHCR, then
# SSHes into the target VPS and runs pull-deploy.sh.

name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name (dev | prod)
        type: string
        required: true
      image_tag:
        description: Image tag (default = short git sha)
        type: string
        required: false

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Compute image ref
        id: meta
        run: |
          REPO="${GITHUB_REPOSITORY,,}"   # lowercase required by GHCR
          echo "image=ghcr.io/${REPO}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.tag.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ inputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            GIT_SHA=${{ steps.tag.outputs.tag }}

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: build-push
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE,IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/autoapply

            # Make sure we're on latest compose config + scripts
            git fetch --all --quiet
            git reset --hard origin/main

            # Log in to GHCR (token set once by bootstrap)
            if ! docker info 2>/dev/null | grep -q 'Username: '; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin >/dev/null 2>&1 || true
            fi

            IMAGE="${{ needs.build-push.outputs.image }}" \
            IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}" \
            ./scripts/pull-deploy.sh

      - name: Smoke test /api/health
        env:
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
        run: |
          # Strip whitespace + stray scheme/trailing slashes from the env var —
          # GitHub doesn't trim variable values, so a pasted-in space would
          # otherwise become "https://host /api/health" and curl rejects it.
          HOST=$(echo "$PUBLIC_URL" | tr -d '[:space:]' | sed -E 's#^https?://##; s#/+$##')
          if [ -z "$HOST" ]; then
            echo "PUBLIC_URL variable is empty — set it in the environment settings" >&2
            exit 1
          fi
          curl -fsSL --max-time 10 "https://${HOST}/api/health" | tee /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
